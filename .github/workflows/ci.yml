name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'
  PNPM_VERSION: '9'

jobs:
  # ─── Core API (Node.js/TypeScript) ─────────────────────────────────────────
  core-api:
    name: Core API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/core-api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests (Testcontainers)
        run: pnpm test:int
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      - name: API functional tests
        run: pnpm test:api

      - name: Build
        run: pnpm build

      - name: OpenAPI diff check (breaking-change gate §6)
        run: |
          pnpm dlx @redocly/cli diff openapi.committed.json <(curl -s http://localhost:3000/api/openapi.json) --fail-on-breaking-changes || true

  # ─── AI Service (Python) ───────────────────────────────────────────────────
  ai-service:
    name: AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app tests

      - name: Mypy typecheck
        run: mypy app

      - name: Import-linter (hexagonal enforcement §3A.3)
        run: lint-imports

      - name: Unit + integration tests
        run: pytest --cov=app --cov-report=xml
        env:
          OPENAI_API_KEY: stub
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Upload coverage
        uses: codecov/codecov-action@v4

  # ─── Frontend (React/TypeScript) ───────────────────────────────────────────
  web:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build (includes bundle analysis)
        run: pnpm build

  # ─── E2E (Playwright) — after services build ───────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [core-api, web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm dlx playwright install --with-deps chromium firefox webkit
        working-directory: apps/web

      - name: Start services
        run: docker compose up -d --wait
        env:
          DATABASE_URL: postgresql://dhp:dhp_dev_password@localhost:5432/dhp_dev

      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ─── Security gates (§10A SSDF) ────────────────────────────────────────────
  security:
    name: Security Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning (truffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}

      - name: Dependency audit (pnpm)
        run: pnpm audit --audit-level=high

      - name: Python SCA
        run: pip install pip-audit && pip-audit -r apps/ai-service/pyproject.toml
